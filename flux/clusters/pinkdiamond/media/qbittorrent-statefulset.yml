apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: qbittorrent
  namespace: media
spec:
  serviceName: qbittorrent
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: qbittorrent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: qbittorrent
    spec:
      initContainers:
        - name: generate-vpn-config
          image: ghcr.io/unstoppablemango/pia-manual-connections:v0.2.2-pia2026-01-30r0
          env:
            - name: PIA_USER
              valueFrom:
                secretKeyRef:
                  name: private-internet-access
                  key: username
            - name: PIA_PASS
              valueFrom:
                secretKeyRef:
                  name: private-internet-access
                  key: password
            - name: VPN_PROTOCOL
              value: wireguard
            - name: PIA_CONNECT
              value: "false"
            - name: PIA_CONF_PATH
              value: /vpn/wg0.conf
            - name: AUTOCONNECT
              value: "true"
            - name: DISABLE_IPV6
              value: "yes"
            - name: PIA_DNS
              value: "false"
            - name: PIA_PF
              value: "false"
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: vpn-config
              mountPath: /vpn
      containers:
        - name: gluetun
          image: ghcr.io/qdm12/gluetun:v3.41.1
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
          env:
            - name: VPN_SERVICE_PROVIDER
              value: custom
            - name: VPN_TYPE
              value: wireguard
            # https://github.com/qdm12/gluetun-wiki/blob/main/setup/options/firewall.md
            - name: FIREWALL_OUTBOUND_SUBNETS
              value: 10.42.0.0/16,10.43.0.0/16
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
          volumeMounts:
            - name: vpn-config
              mountPath: /gluetun/wireguard
        - name: qbittorrent
          image: lscr.io/linuxserver/qbittorrent:5.1.4-r2-ls448
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: America/Chicago
            - name: WEBUI_PORT
              value: "8080"
            - name: TORRENTING_PORT
              value: "6881"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
          ports:
            - containerPort: 8080
              name: http-web
            - containerPort: 6881
              name: bittorrent-tcp
              protocol: TCP
            - containerPort: 6881
              name: bittorrent-udp
              protocol: UDP
          volumeMounts:
            - name: config
              mountPath: /config
            - name: downloads
              mountPath: /downloads
      volumes:
        - name: vpn-config
          emptyDir: {}
        - name: downloads
          persistentVolumeClaim:
            claimName: qbittorrent-downloads
  volumeClaimTemplates:
    - metadata:
        name: config
      spec:
        storageClassName: ssd-rbd
        accessModes:
          - ReadWriteOncePod
        resources:
          requests:
            storage: 1Gi
