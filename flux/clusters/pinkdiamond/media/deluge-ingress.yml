apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: deluge
  namespace: media
spec:
  parentRefs:
    - name: nginx
      namespace: nginx-gateway
  hostnames:
    - deluge.thecluster.lan
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: deluge
          port: 8112
