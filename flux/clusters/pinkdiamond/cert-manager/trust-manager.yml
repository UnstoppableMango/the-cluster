apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trust-manager
  namespace: cert-manager
spec:
  interval: 30m
  releaseName: trust-manager
  targetNamespace: cert-manager
  chart:
    spec:
      chart: trust-manager
      version: v0.22.0
      sourceRef:
        kind: HelmRepository
        name: jetstack
  # https://github.com/cert-manager/trust-manager/tree/main/deploy/charts/trust-manager
  values:
    image:
      repository: quay.io/jetstack/trust-manager
      tag: v0.22.0
    defaultPackage:
      enabled: false
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
