apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nginx-gateway-fabric
  namespace: nginx-gateway
spec:
  interval: 10m
  releaseName: nginx-gateway-fabric
  targetNamespace: nginx-gateway
  chart:
    spec:
      chart: nginx-gateway-fabric
      version: 1.4.0
      sourceRef:
        kind: HelmRepository
        name: nginx-gateway
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  # https://github.com/nginxinc/nginx-gateway-fabric/blob/main/charts/nginx-gateway-fabric/values.yaml
  values:
    service:
      type: LoadBalancer
      externalTrafficPolicy: Local
