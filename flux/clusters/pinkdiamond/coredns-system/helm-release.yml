apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: coredns-a
  namespace: coredns-system
spec:
  interval: 10m
  releaseName: coredns-a
  targetNamespace: coredns-system
  chart:
    spec:
      chart: coredns
      version: 1.36.0
      sourceRef:
        kind: HelmRepository
        name: coredns
  values:
    isClusterService: false
    replicaCount: 1
    affinity:
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 1
            preference:
              matchExpressions:
                - key: kubernetes.io/hostname
                  operator: NotIn
                  values: [gaea]
    service:
      type: LoadBalancer
      loadBalancerIP: 192.168.1.46
    servers:
      - zones:
          - zone: .
        port: 53
        plugins:
          - name: errors
          - name: health
            configBlock: |-
              lameduck 5s
          - name: ready
          - name: forward
            parameters: . 1.1.1.1 8.8.8.8
            configBlock: |-
              max_concurrent 1000
          - name: cache
            parameters: "30"
          - name: loop
          - name: reload
          - name: loadbalance
