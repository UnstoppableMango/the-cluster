apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: coredns-system
spec:
  interval: 10m
  releaseName: external-dns
  targetNamespace: coredns-system
  chart:
    spec:
      chart: external-dns
      version: 1.18.0
      sourceRef:
        kind: HelmRepository
        name: external-dns
  values:
    image:
      repository: registry.k8s.io/external-dns/external-dns
      tag: v0.19.0
    domainFilters:
      - thecluster.lan
    interval: 5m
    provider:
      name: coredns
    env:
      - name: ETCD_URLS
        value: http://etcd.coredns-system.svc.cluster.local:2379
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
