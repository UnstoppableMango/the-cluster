apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: etcd
  namespace: coredns-system
spec:
  serviceName: etcd
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: etcd
  template:
    metadata:
      labels:
        app.kubernetes.io/name: etcd
    spec:
      containers:
        - name: etcd
          image: registry.k8s.io/etcd:3.6.10-0
          command:
            - etcd
            - --name=etcd-0
            - --data-dir=/var/lib/etcd
            - --listen-client-urls=http://0.0.0.0:2379
            - --advertise-client-urls=http://etcd.coredns-system.svc.cluster.local:2379
            - --listen-peer-urls=http://0.0.0.0:2380
            - --initial-advertise-peer-urls=http://etcd.coredns-system.svc.cluster.local:2380
            - --initial-cluster=etcd-0=http://etcd.coredns-system.svc.cluster.local:2380
            - --initial-cluster-token=coredns-etcd
            - --initial-cluster-state=new
            - --auto-compaction-mode=revision
            - --auto-compaction-retention=1000
            - --quota-backend-bytes=536870912
          ports:
            - name: client
              containerPort: 2379
            - name: peer
              containerPort: 2380
          livenessProbe:
            httpGet:
              path: /health
              port: 2379
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 2379
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/etcd
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOncePod]
        storageClassName: ssd-rbd
        resources:
          requests:
            storage: 1Gi
