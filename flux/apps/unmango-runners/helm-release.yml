apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: unmango-runners
  namespace: unmango-runners
spec:
  chartRef:
    kind: OCIRepository
    name: gha-runner-scale-set
    namespace: arc-system
  interval: 10m
  # https://github.com/actions/actions-runner-controller/blob/master/charts/gha-runner-scale-set/values.yaml
  values:
    githubConfigUrl: https://github.com/unmango
    githubConfigSecret: thecluster-bot
    template:
      spec:
        containers:
          - name: runner
            image: ghcr.io/unstoppablemango/the-cluster/actions-runner:v2.333.1@sha256:ebf6e20a89b043dc7baf4de8caa35a23c3334ce27ea713d949162d4b2ea22873
            command: [/home/runner/run.sh]
