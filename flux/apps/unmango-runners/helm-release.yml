apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: unmango-runners
  namespace: unmango-runners
spec:
  chartRef:
    kind: OCIRepository
    name: gha-runner-scale-set
    namespace: arc-system
  interval: 10m
  # https://github.com/actions/actions-runner-controller/blob/master/charts/gha-runner-scale-set/values.yaml
  values:
    githubConfigUrl: https://github.com/unmango
    githubConfigSecret: thecluster-bot
    template:
      spec:
        containers:
          - name: runner
            image: ghcr.io/unstoppablemango/the-cluster/actions-runner:v2.333.1@sha256:c747185a4a1279614abef606eec84bbb1e34fb9f0a6534c0ffe76e768d1b3782
            command: [/home/runner/run.sh]
