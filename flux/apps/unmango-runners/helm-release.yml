apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: unmango-runners
  namespace: unmango-runners
spec:
  chartRef:
    kind: OCIRepository
    name: gha-runner-scale-set
    namespace: arc-system
  interval: 10m
  # https://github.com/actions/actions-runner-controller/blob/master/charts/gha-runner-scale-set/values.yaml
  values:
    githubConfigUrl: https://github.com/unmango
    githubConfigSecret: thecluster-bot
    template:
      spec:
        containers:
          - name: runner
            image: ghcr.io/unstoppablemango/the-cluster/actions-runner:v2.334.0@sha256:552f106b3830d59bb8a70a39953a22cc47f889a6c5400f01ad1346eddd44e41b
            command: [/home/runner/run.sh]
            resources:
              limits:
                smarter-devices/fuse: 1
