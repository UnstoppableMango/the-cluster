apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pihole-a-external-dns
  namespace: pihole
spec:
  interval: 10m
  chart:
    spec:
      chart: external-dns
      version: 1.20.0
      sourceRef:
        kind: HelmRepository
        name: external-dns
  install:
    crds: Skip
  upgrade:
    crds: Skip
  # https://github.com/kubernetes-sigs/external-dns/blob/master/charts/external-dns/values.yaml
  values:
    image:
      repository: registry.k8s.io/external-dns/external-dns
      tag: v0.19.0
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    affinity:
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 1
            preference:
              matchExpressions:
                - key: kubernetes.io/hostname
                  operator: NotIn
                  values:
                    - gaea
    domainFilters:
      - thecluster.lan
    interval: 30m
    # https://kubernetes-sigs.github.io/external-dns/latest/docs/tutorials/pihole/#arguments
    env:
      - name: EXTERNAL_DNS_PIHOLE_PASSWORD
        valueFrom:
          secretKeyRef:
            name: pihole
            key: password
      - name: EXTERNAL_DNS_PIHOLE_SERVER
        value: http://pihole-a-web.pihole.svc.cluster.local
      - name: EXTERNAL_DNS_PIHOLE_TLS_SKIP_VERIFY
        value: "true"
      - name: EXTERNAL_DNS_PIHOLE_API_VERSION
        value: "6"
    registry: noop
    provider:
      name: pihole
---
