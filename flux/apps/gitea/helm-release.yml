apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redis
  namespace: gitea
spec:
  interval: 1h
  releaseName: redis
  targetNamespace: gitea
  chart:
    spec:
      chart: charts/redis
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gitea
  namespace: gitea
spec:
  interval: 1h
  releaseName: gitea
  dependsOn:
    - name: redis
      namespace: gitea
  targetNamespace: gitea
  chart:
    spec:
      chart: gitea
      version: 10.6.0
      sourceRef:
        kind: HelmRepository
        name: gitea
  valuesFrom:
    - kind: Secret
      name: pg-credentials
      valuesKey: username
      targetPath: gitea.config.database.USER
    - kind: Secret
      name: pg-credentials
      valuesKey: password
      targetPath: gitea.config.database.PASSWD
  values:
    replicaCount: 1
    service:
      http:
        type: ClusterIP
        port: 3000
      ssh:
        type: ClusterIP
        port: 22
    ingress:
      enabled: false
    persistence:
      enabled: true
      storageClass: unsafe-rbd
      size: 20Gi
      accessModes:
        - ReadWriteOnce
    gitea:
      admin:
        existingSecret: gitea
        passwordKey: adminPassword
      config:
        APP_NAME: The Cluster Gitea
        server:
          DOMAIN: gitea.thecluster.io
          ROOT_URL: https://gitea.thecluster.io
          SSH_DOMAIN: gitea.thecluster.io
          SSH_PORT: 22
          SSH_LISTEN_PORT: 22
          START_SSH_SERVER: true
        database:
          DB_TYPE: postgres
          HOST: postgres-rw.gitea.svc.cluster.local:5432
          NAME: gitea
          SSL_MODE: disable
        cache:
          ADAPTER: redis
          HOST: redis://redis.gitea.svc.cluster.local:6379/0
        session:
          PROVIDER: redis
          PROVIDER_CONFIG: redis://redis.gitea.svc.cluster.local:6379/1
        queue:
          TYPE: redis
          CONN_STR: redis://redis.gitea.svc.cluster.local:6379/2
      oauth:
        - name: GitHub
          provider: github
          existingSecret: gitea
    postgresql:
      enabled: false
    postgresql-ha:
      enabled: false
    redis-cluster:
      enabled: false
    redis:
      enabled: false
