apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: bitwarden
  namespace: bitwarden
spec:
  interval: 10m
  releaseName: bitwarden
  targetNamespace: bitwarden
  chart:
    spec:
      chart: self-host
      version: 2.0.0
      sourceRef:
        kind: HelmRepository
        name: bitwarden
  values:
    fullnameOverride: bitwarden
    general:
      domain: bitwarden.thecluster.io
      databaseProvider: postgres
      ingress:
        enabled: false
      gateway:
        enabled: false
      volumeAccessMode: ReadWriteMany
      email:
        replyToEmail: bitwarden@thecluster.io
        smtpHost: email-smtp.us-east-2.amazonaws.com
        smtpPort: "587"
        smtpSsl: "false"
    sharedStorageClassName: default-cephfs
    secrets:
      secretName: bitwarden-secret
    database:
      enabled: false
    component:
      admin:
        extraEnv:
          - name: globalSettings__postgreSql__connectionString
            valueFrom:
              configMapKeyRef:
                name: bitwarden-db-config
                key: globalSettings__postgreSql__connectionString
        extraVolumeMounts:
          - name: pg-client-cert
            mountPath: /etc/ssl/pg-client
            readOnly: true
        extraVolumes:
          - name: pg-client-cert
            secret:
              secretName: postgres-client-cert
      api:
        extraEnv:
          - name: globalSettings__postgreSql__connectionString
            valueFrom:
              configMapKeyRef:
                name: bitwarden-db-config
                key: globalSettings__postgreSql__connectionString
        extraVolumeMounts:
          - name: pg-client-cert
            mountPath: /etc/ssl/pg-client
            readOnly: true
        extraVolumes:
          - name: pg-client-cert
            secret:
              secretName: postgres-client-cert
      identity:
        extraEnv:
          - name: globalSettings__postgreSql__connectionString
            valueFrom:
              configMapKeyRef:
                name: bitwarden-db-config
                key: globalSettings__postgreSql__connectionString
        extraVolumeMounts:
          - name: pg-client-cert
            mountPath: /etc/ssl/pg-client
            readOnly: true
        extraVolumes:
          - name: pg-client-cert
            secret:
              secretName: postgres-client-cert
      events:
        extraEnv:
          - name: globalSettings__postgreSql__connectionString
            valueFrom:
              configMapKeyRef:
                name: bitwarden-db-config
                key: globalSettings__postgreSql__connectionString
        extraVolumeMounts:
          - name: pg-client-cert
            mountPath: /etc/ssl/pg-client
            readOnly: true
        extraVolumes:
          - name: pg-client-cert
            secret:
              secretName: postgres-client-cert
      notifications:
        extraEnv:
          - name: globalSettings__postgreSql__connectionString
            valueFrom:
              configMapKeyRef:
                name: bitwarden-db-config
                key: globalSettings__postgreSql__connectionString
        extraVolumeMounts:
          - name: pg-client-cert
            mountPath: /etc/ssl/pg-client
            readOnly: true
        extraVolumes:
          - name: pg-client-cert
            secret:
              secretName: postgres-client-cert
      sso:
        extraEnv:
          - name: globalSettings__postgreSql__connectionString
            valueFrom:
              configMapKeyRef:
                name: bitwarden-db-config
                key: globalSettings__postgreSql__connectionString
        extraVolumeMounts:
          - name: pg-client-cert
            mountPath: /etc/ssl/pg-client
            readOnly: true
        extraVolumes:
          - name: pg-client-cert
            secret:
              secretName: postgres-client-cert
      scim:
        extraEnv:
          - name: globalSettings__postgreSql__connectionString
            valueFrom:
              configMapKeyRef:
                name: bitwarden-db-config
                key: globalSettings__postgreSql__connectionString
        extraVolumeMounts:
          - name: pg-client-cert
            mountPath: /etc/ssl/pg-client
            readOnly: true
        extraVolumes:
          - name: pg-client-cert
            secret:
              secretName: postgres-client-cert
