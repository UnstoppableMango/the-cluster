apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: unstoppablemango-renovate
  namespace: renovate
spec:
  interval: 10m
  releaseName: unstoppablemango-renovate
  targetNamespace: renovate
  chart:
    spec:
      chart: renovate
      version: 46.178.1
      sourceRef:
        kind: HelmRepository
        name: renovate
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  # https://github.com/renovatebot/helm-charts/blob/main/charts/renovate/values.yaml
  values:
    image:
      registry: ghcr.io # default
      repository: renovatebot/renovate # default
      tag: 43.209.1
    renovate:
      configIsJavaScript: true
      config: |
        const fs = require('fs');

        const token = fs.readFileSync('/shared/token', 'utf8').trim();

        module.exports = {
          token,
          platform: 'github',
          autodiscover: true,
          autodiscoverFilter: [
            '!UnstoppableMango/aytdlw',
            '!UnstoppableMango/dotnet-nfs-client',
            '!UnstoppableMango/haskell-snake',
            '!UnstoppableMango/imaug-2022-bicep',
            '!UnstoppableMango/katas',
            '!UnstoppableMango/rust-os',
            '!UnstoppableMango/az-swa-demo',
            '!UnstoppableMango/pulumi-talos-80-repro',
            '!UnstoppableMango/blocky-controller',
            '!UnstoppableMango/palumi-world',
            '!UnstoppableMango/fsharp-property-testing',
            '!UnstoppableMango/pulumi-ci-mgmt',
            '!UnstoppableMango/everybody-codes',
            '!UnstoppableMango/jpl-notes',
            '!UnstoppableMango/pulumi-kubernetes-the-hard-way',
            '!UnstoppableMango/Docker.FSharp',
            '!UnstoppableMango/Docker.Dotnet.FSharp',
            '!UnstoppableMango/dotnet-proxmox-client',
            '!UnstoppableMango/imaug',
            '!UnstoppableMango/mango-mtg',
            '!UnstoppableMango/proxmox-client',
            '!UnstoppableMango/pulumi-imaug',
            '!UnstoppableMango/pulumi-proxmox',
            '!UnstoppableMango/SE3730_Tutorial',
            '!UnstoppableMango/gast',
            '!UnstoppableMango/perry-operator',
            '!UnstoppableMango/pfsense',
            '!UnstoppableMango/kubernetes-the-wrong-way',
            '!UnstoppableMango/http',
            '!UnstoppableMango/rest',
            '!UnstoppableMango/xml',
            '!UnstoppableMango/fp-cs',
            '!UnstoppableMango/sai-ama',
            '!UnstoppableMango/openshift-lab',
          ],
          presetCachePersistence: true,
        };
    cronjob:
      schedule: '*/15 * * * *'
      timeZone: 'America/Chicago'
      initContainers:
        - name: github-app-auth
          image: oven/bun:1.3.14
          env:
            - name: GITHUB_APP_ID
              valueFrom:
                secretKeyRef:
                  name: thecluster-app
                  key: app-id
            - name: GITHUB_INSTALLATION_ID
              valueFrom:
                configMapKeyRef:
                  name: installation-ids
                  key: unstoppablemango
          command:
            - /bin/sh
            - -c
            - |
              bunx github-app-installation-token \
              --appId "${GITHUB_APP_ID}" \
              --installationId "${GITHUB_INSTALLATION_ID}" \
              --privateKeyLocation /auth/key.pem \
              > /shared/token
          volumeMounts:
            - name: private-key
              mountPath: /auth/key.pem
              subPath: key.pem
            - name: shared
              mountPath: /shared
    env:
      LOG_LEVEL: debug
      RENOVATE_REDIS_URL: redis://redis.renovate.svc.cluster.local:6379/0
    extraVolumeMounts:
      - name: shared
        mountPath: /shared
    extraVolumes:
      - name: private-key
        secret:
          secretName: thecluster-app
      - name: shared
        emptyDir: {}
    resources:
      requests:
        cpu: '1'
        memory: 256Mi
      limits:
        cpu: '2'
        memory: 4Gi
