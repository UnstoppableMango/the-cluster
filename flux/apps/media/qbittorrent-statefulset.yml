apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: qbittorrent
  namespace: media
spec:
  serviceName: qbittorrent
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: qbittorrent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: qbittorrent
    spec:
      securityContext:
        fsGroup: 1000
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      initContainers:
        - name: set-webui-password
          image: python:3.12.4-alpine3.20
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          env:
            - name: WEBUI_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: qbittorrent
                  key: password
          command: ["python3", "-c"]
          args:
            - |
              # https://github.com/qbittorrent/qBittorrent/blob/master/src/base/utils/password.cpp
              import hashlib, os, base64, secrets, re
              from pathlib import Path

              password = os.environ['WEBUI_PASSWORD']
              salt = secrets.token_bytes(16)  # 4x uint32
              key = hashlib.pbkdf2_hmac('sha512', password.encode(), salt, 100000, dklen=64)
              hash_value = '@ByteArray(' + base64.b64encode(salt).decode() + ':' + base64.b64encode(key).decode() + ')'
              line = 'WebUI\\Password_PBKDF2="' + hash_value + '"'

              config_dir = Path('/config/qBittorrent')
              config_dir.mkdir(parents=True, exist_ok=True)
              config_path = config_dir / 'qBittorrent.conf'

              if config_path.exists():
                  text = config_path.read_text()
                  if 'Password_PBKDF2' in text:
                      text = re.sub(r'WebUI.Password_PBKDF2=.*', lambda _: line, text)
                  elif '[Preferences]' in text:
                      text = text.replace('[Preferences]', '[Preferences]\n' + line, 1)
                  else:
                      text += '\n[Preferences]\n' + line + '\n'
              else:
                  text = '[Preferences]\n' + line + '\n'

              config_path.write_text(text)
              print('WebUI password set')
          volumeMounts:
            - name: config
              mountPath: /config
        - name: generate-vpn-config
          image: ghcr.io/unstoppablemango/pia-manual-connections:v0.2.2-pia2026-01-30r0
          env:
            - name: PIA_USER
              valueFrom:
                secretKeyRef:
                  name: private-internet-access
                  key: username
            - name: PIA_PASS
              valueFrom:
                secretKeyRef:
                  name: private-internet-access
                  key: password
            - name: VPN_PROTOCOL
              value: wireguard
            - name: PIA_CONNECT
              value: "false"
            - name: PIA_CONF_PATH
              value: /vpn/wg0.conf
            - name: AUTOCONNECT
              value: "true"
            - name: DISABLE_IPV6
              value: "yes"
            - name: PIA_DNS
              value: "false"
            - name: PIA_PF
              value: "false"
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: vpn-config
              mountPath: /vpn
        - name: gluetun
          image: ghcr.io/qdm12/gluetun:v3.41.1
          restartPolicy: Always
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
          env:
            - name: VPN_SERVICE_PROVIDER
              value: custom
            - name: VPN_TYPE
              value: wireguard
            # https://github.com/qdm12/gluetun-wiki/blob/main/setup/options/firewall.md
            - name: FIREWALL_OUTBOUND_SUBNETS
              value: 10.42.0.0/16,10.43.0.0/16
            - name: FIREWALL_INPUT_PORTS
              value: 8080,6881
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          startupProbe:
            exec:
              command:
                - /gluetun
                - healthcheck
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - /gluetun
                - healthcheck
            periodSeconds: 30
          readinessProbe:
            exec:
              command:
                - /gluetun
                - healthcheck
            periodSeconds: 10
          # https://github.com/qdm12/gluetun-wiki/blob/main/setup/advanced/kubernetes.md
          lifecycle:
            postStart:
              exec:
                command:
                  - "/bin/sh"
                  - "-c"
                  - "(ip rule del table 51820 2>/dev/null; ip -6 rule del table 51820 2>/dev/null) || true"
          volumeMounts:
            - name: vpn-config
              mountPath: /gluetun/wireguard
      containers:
        - name: qbittorrent
          image: lscr.io/linuxserver/qbittorrent:5.1.4-r2-ls448
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: America/Chicago
            - name: WEBUI_PORT
              value: "8080"
            - name: TORRENTING_PORT
              value: "6881"
          resources:
            requests:
              cpu: 500m
              memory: 384Mi
            limits:
              cpu: "2"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            periodSeconds: 10
          ports:
            - containerPort: 8080
              name: http-web
            - containerPort: 6881
              name: bittorrent-tcp
              protocol: TCP
            - containerPort: 6881
              name: bittorrent-udp
              protocol: UDP
          volumeMounts:
            - name: config
              mountPath: /config
            - name: downloads
              mountPath: /downloads
      volumes:
        - name: vpn-config
          emptyDir: {}
        - name: downloads
          persistentVolumeClaim:
            claimName: qbittorrent-downloads
  volumeClaimTemplates:
    - metadata:
        name: config
      spec:
        storageClassName: ssd-rbd
        accessModes:
          - ReadWriteOncePod
        resources:
          requests:
            storage: 1Gi
