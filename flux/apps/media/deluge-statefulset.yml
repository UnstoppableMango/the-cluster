apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: deluge
  namespace: media
spec:
  serviceName: deluge
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: deluge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: deluge
    spec:
      securityContext:
        fsGroup: 1000
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      initContainers:
        - name: generate-vpn-config
          image: ghcr.io/unstoppablemango/pia-manual-connections:v0.2.2-pia2026-01-30r0
          env:
            - name: PIA_USER
              valueFrom:
                secretKeyRef:
                  name: private-internet-access
                  key: username
            - name: PIA_PASS
              valueFrom:
                secretKeyRef:
                  name: private-internet-access
                  key: password
            - name: VPN_PROTOCOL
              value: wireguard
            - name: PIA_CONNECT
              value: "false"
            - name: PIA_CONF_PATH
              value: /vpn/wg0.conf
            - name: AUTOCONNECT
              value: "true"
            - name: DISABLE_IPV6
              value: "yes"
            - name: PIA_DNS
              value: "false"
            - name: PIA_PF
              value: "false"
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: vpn-config
              mountPath: /vpn
        - name: gluetun
          image: ghcr.io/qdm12/gluetun:v3.41.1
          restartPolicy: Always
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
          env:
            - name: VPN_SERVICE_PROVIDER
              value: custom
            - name: VPN_TYPE
              value: wireguard
            # https://github.com/qdm12/gluetun-wiki/blob/main/setup/options/firewall.md
            - name: FIREWALL_OUTBOUND_SUBNETS
              value: 10.42.0.0/16,10.43.0.0/16
            - name: FIREWALL_INPUT_PORTS
              value: 8000,8112,6881,58846
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          startupProbe:
            httpGet:
              path: /healthcheck
              port: 8000
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthcheck
              port: 8000
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: 8000
            periodSeconds: 10
          # https://github.com/qdm12/gluetun-wiki/blob/main/setup/advanced/kubernetes.md
          lifecycle:
            postStart:
              exec:
                command:
                  - "/bin/sh"
                  - "-c"
                  - "(ip rule del table 51820 2>/dev/null; ip -6 rule del table 51820 2>/dev/null) || true"
          volumeMounts:
            - name: vpn-config
              mountPath: /gluetun/wireguard
      containers:
        - name: deluge
          image: lscr.io/linuxserver/deluge:2.2.0-ls371
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: America/Chicago
          resources:
            requests:
              cpu: 256m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1536Mi
          livenessProbe:
            httpGet:
              path: /
              port: 8112
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 8112
            periodSeconds: 10
          ports:
            - containerPort: 8112
              name: http-web
            - containerPort: 6881
              name: bittorrent-tcp
              protocol: TCP
            - containerPort: 6881
              name: bittorrent-udp
              protocol: UDP
            - containerPort: 58846
              name: deluged
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /config
            - name: downloads
              mountPath: /downloads
      volumes:
        - name: vpn-config
          emptyDir: {}
        - name: downloads
          persistentVolumeClaim:
            claimName: deluge-downloads
  volumeClaimTemplates:
    - metadata:
        name: config
      spec:
        storageClassName: ssd-rbd
        accessModes:
          - ReadWriteOncePod
        resources:
          requests:
            storage: 1Gi
