apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: agones
  namespace: agones-system
spec:
  interval: 10m
  releaseName: agones
  targetNamespace: agones-system
  chart:
    spec:
      chart: agones
      version: 1.57.0
      sourceRef:
        kind: HelmRepository
        name: agones
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  values:
    gameservers:
      namespaces:
        - shulker-system
    agones:
      controller:
        resources:
          requests:
            cpu: 10m
            memory: 128Mi
          limits:
            cpu: 100m
            memory: 256Mi
      allocator:
        install: true
        service:
          serviceType: ClusterIP
