apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: awx-operator
  namespace: awx-system
spec:
  sourceRef:
    kind: GitRepository
    name: awx-operator
  path: ./config/default
  interval: 30m
  prune: true
  targetNamespace: awx-system
  wait: true
  images:
    - name: gcr.io/kubebuilder/kube-rbac-proxy
      newName: quay.io/brancz/kube-rbac-proxy
      newTag: v0.15.0
    - name: quay.io/ansible/awx-operator
      newTag: 2.19.1
