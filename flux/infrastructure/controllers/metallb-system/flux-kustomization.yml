apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: metallb-config
  namespace: flux-system
spec:
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./flux/clusters/pinkdiamond/metallb-system/config
  interval: 10m
  prune: true
  dependsOn:
    - name: flux-system
      namespace: flux-system
