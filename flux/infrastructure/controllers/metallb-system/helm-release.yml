apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metallb
  namespace: metallb-system
spec:
  interval: 10m
  releaseName: metallb
  targetNamespace: metallb-system
  chart:
    spec:
      chart: metallb
      version: 0.15.3
      sourceRef:
        kind: HelmRepository
        name: metallb
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  # https://metallb.io/configuration/
  values:
    crds:
      enabled: true
    controller:
      priorityClassName: system-cluster-critical
    speaker:
      priorityClassName: system-cluster-critical
