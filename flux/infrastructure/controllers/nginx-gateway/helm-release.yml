apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nginx-gateway-fabric
  namespace: nginx-gateway
spec:
  interval: 10m
  releaseName: nginx-gateway-fabric
  targetNamespace: nginx-gateway
  chartRef:
    kind: OCIRepository
    name: nginx-gateway-fabric
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  # https://github.com/nginxinc/nginx-gateway-fabric/blob/main/charts/nginx-gateway-fabric/values.yaml
  values:
    fullnameOverride: nginx-gateway-fabric
    nginxGateway:
      replicas: 2
      image:
        repository: ghcr.io/nginx/nginx-gateway-fabric
        tag: 2.6.3
      gwAPIExperimentalFeatures:
        enable: true
      productTelemetry:
        enable: false
    certGenerator:
      enable: false
    nginx:
      kind: daemonSet
      image:
        repository: ghcr.io/nginx/nginx-gateway-fabric/nginx
        tag: 2.6.3
      service:
        externalTrafficPolicy: Cluster # https://metallb.io/usage/#ip-address-sharing
    gateways:
      - name: nginx
        namespace: nginx-gateway
        spec:
          gatewayClassName: nginx
          infrastructure:
            annotations:
              metallb.io/loadBalancerIPs: 192.168.1.43
              metallb.io/allow-shared-ip: lan-gateway
          listeners:
            - name: https
              port: 443
              protocol: HTTPS
              tls:
                mode: Terminate
                certificateRefs:
                  - name: thecluster-lan-wildcard-tls
              allowedRoutes:
                namespaces:
                  from: All
