apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: coredns-system
spec:
  interval: 10m
  releaseName: external-dns
  targetNamespace: coredns-system
  chart:
    spec:
      chart: external-dns
      version: 1.20.0
      sourceRef:
        kind: HelmRepository
        name: external-dns
  install:
    crds: Skip
  upgrade:
    crds: Skip
  values:
    image:
      repository: registry.k8s.io/external-dns/external-dns
      tag: v0.21.0
    sources:
      - service
      - ingress
      - gateway-httproute
      - gateway-grpcroute
      - gateway-tlsroute
      - gateway-tcproute
      - gateway-udproute
    domainFilters:
      - thecluster.lan
    interval: 5m
    provider:
      name: coredns
    env:
      - name: ETCD_URLS
        value: https://etcd.coredns-system.svc.cluster.local:2379
      - name: ETCD_CERT_FILE
        value: /etc/external-dns/etcd-client-tls/tls.crt
      - name: ETCD_KEY_FILE
        value: /etc/external-dns/etcd-client-tls/tls.key
      - name: ETCD_CA_FILE
        value: /etc/external-dns/ca/ca.crt
    extraVolumes:
      - name: etcd-client-tls
        secret:
          secretName: etcd-client-tls
      - name: ca
        configMap:
          name: thecluster-lan-ca
    extraVolumeMounts:
      - name: etcd-client-tls
        mountPath: /etc/external-dns/etcd-client-tls
        readOnly: true
      - name: ca
        mountPath: /etc/external-dns/ca
        readOnly: true
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
