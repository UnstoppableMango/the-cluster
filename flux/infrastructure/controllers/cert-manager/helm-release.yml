apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 30m
  releaseName: cert-manager
  targetNamespace: cert-manager
  chart:
    spec:
      chart: cert-manager
      version: v1.18.2
      sourceRef:
        kind: HelmRepository
        name: jetstack
  # https://artifacthub.io/packages/helm/cert-manager/cert-manager
  values:
    crds:
      enabled: false
    podDisruptionBudget:
      enabled: true
      minAvailable: 1
    enableCertificateOwnerRef: true
