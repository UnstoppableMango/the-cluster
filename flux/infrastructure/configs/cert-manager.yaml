apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-configs-cert-manager
  namespace: flux-system
spec:
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./flux/infrastructure/configs/cert-manager
  interval: 10m
  prune: true
  wait: true
  dependsOn:
    - name: infra-cert-manager
