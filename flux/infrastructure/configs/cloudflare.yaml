apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-configs-cloudflare
  namespace: flux-system
spec:
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./flux/infrastructure/configs/cloudflare-system
  interval: 10m
  prune: true
  dependsOn:
    - name: infra-cloudflare
