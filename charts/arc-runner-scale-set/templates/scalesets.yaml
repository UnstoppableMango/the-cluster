{{- range $.Values.scaleSets }}
{{- $ss := mergeOverwrite (deepCopy $.Values.defaults) (omit . "name") }}
{{- $ctx := dict "ss" $ss "name" .name "release" $.Release "chart" $.Chart "capabilities" $.Capabilities "namespace" $.Release.Namespace }}
{{- $containerMode := default (dict) $ss.containerMode }}
{{- $isKube := or (eq $containerMode.type "kubernetes") (eq $containerMode.type "kubernetes-novolume") }}
{{- $isDind := eq $containerMode.type "dind" }}
{{- $fullname := include "arc-runner-scale-set.fullname" $ctx }}
{{- $noPermSA := include "arc-runner-scale-set.noPermissionSAName" $ctx }}
{{- $managerRole := include "arc-runner-scale-set.managerRoleName" $ctx }}
{{- $kubeSA := include "arc-runner-scale-set.kubeModeServiceAccountName" $ctx }}
{{- $kubeRole := include "arc-runner-scale-set.kubeModeRoleName" $ctx }}
---
{{- if $isKube }}
# Kube-mode service account for runner pods
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $kubeSA }}
  namespace: {{ $ctx.namespace }}
  labels:
    {{- include "arc-runner-scale-set.labels" $ctx | nindent 4 }}
  finalizers:
    - actions.github.com/cleanup-protection
---
# Kube-mode role allowing runner pods to manage job pods
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $kubeRole }}
  namespace: {{ $ctx.namespace }}
  labels:
    {{- include "arc-runner-scale-set.labels" $ctx | nindent 4 }}
  finalizers:
    - actions.github.com/cleanup-protection
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["get", "create"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list", "watch"]
  {{- if ne $containerMode.type "kubernetes-novolume" }}
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "create", "delete"]
  {{- end }}
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $kubeRole }}
  namespace: {{ $ctx.namespace }}
  labels:
    {{- include "arc-runner-scale-set.labels" $ctx | nindent 4 }}
  finalizers:
    - actions.github.com/cleanup-protection
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $kubeRole }}
subjects:
  - kind: ServiceAccount
    name: {{ $kubeSA }}
    namespace: {{ $ctx.namespace }}
{{- else }}
# No-permission service account for runner pods (default and dind modes)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $noPermSA }}
  namespace: {{ $ctx.namespace }}
  labels:
    {{- include "arc-runner-scale-set.labels" $ctx | nindent 4 }}
  finalizers:
    - actions.github.com/cleanup-protection
{{- end }}
---
# Role granting the controller management access to this scale set's namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $managerRole }}
  namespace: {{ $ctx.namespace }}
  labels:
    {{- include "arc-runner-scale-set.labels" $ctx | nindent 4 }}
    app.kubernetes.io/component: manager-role
  finalizers:
    - actions.github.com/cleanup-protection
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "delete", "get"]
  - apiGroups: [""]
    resources: ["pods/status"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "delete", "get", "list", "patch", "update"]
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["create", "delete", "get", "list", "patch", "update"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["rolebindings"]
    verbs: ["create", "delete", "get", "patch", "update"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles"]
    verbs: ["create", "delete", "get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $managerRole }}
  namespace: {{ $ctx.namespace }}
  labels:
    {{- include "arc-runner-scale-set.labels" $ctx | nindent 4 }}
    app.kubernetes.io/component: manager-role-binding
  finalizers:
    - actions.github.com/cleanup-protection
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $managerRole }}
subjects:
  - kind: ServiceAccount
    name: {{ include "arc-runner-scale-set.controllerSAName" $ctx }}
    namespace: {{ include "arc-runner-scale-set.controllerSANamespace" $ctx }}
---
apiVersion: actions.github.com/v1alpha1
kind: AutoscalingRunnerSet
metadata:
  name: {{ .name | replace "_" "-" }}
  namespace: {{ $ctx.namespace }}
  labels:
    app.kubernetes.io/component: autoscaling-runner-set
    {{- include "arc-runner-scale-set.labels" $ctx | nindent 4 }}
  annotations:
    actions.github.com/values-hash: {{ toJson $ss | sha256sum | trunc 63 }}
    actions.github.com/cleanup-manager-role-binding: {{ $managerRole }}
    actions.github.com/cleanup-manager-role-name: {{ $managerRole }}
    {{- if $isKube }}
    actions.github.com/cleanup-kubernetes-mode-role-binding-name: {{ $kubeRole }}
    actions.github.com/cleanup-kubernetes-mode-role-name: {{ $kubeRole }}
    actions.github.com/cleanup-kubernetes-mode-service-account-name: {{ $kubeSA }}
    {{- else }}
    actions.github.com/cleanup-no-permission-service-account-name: {{ $noPermSA }}
    {{- end }}
spec:
  githubConfigUrl: {{ required (printf "scaleSets[%s].githubConfigUrl is required" .name) $ss.githubConfigUrl | trimSuffix "/" }}
  githubConfigSecret: {{ required "githubConfigSecret is required" $ss.githubConfigSecret }}
  {{- with $ss.minRunners }}
  minRunners: {{ . }}
  {{- end }}
  {{- with $ss.maxRunners }}
  maxRunners: {{ . }}
  {{- end }}
  {{- with $ss.listenerTemplate }}
  listenerTemplate:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  template:
    {{- with $ss.template.metadata }}
    metadata:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    spec:
      {{- /* Render all spec fields except containers/volumes/initContainers/serviceAccountName */}}
      {{- range $key, $val := $ss.template.spec }}
        {{- if and (ne $key "containers") (ne $key "volumes") (ne $key "initContainers") (ne $key "serviceAccountName") }}
      {{ $key }}: {{ $val | toYaml | nindent 8 }}
        {{- end }}
      {{- end }}
      restartPolicy: {{ default "Never" $ss.template.spec.restartPolicy }}
      serviceAccountName: {{ default (ternary $kubeSA $noPermSA $isKube) $ss.template.spec.serviceAccountName }}
      {{- /* initContainers: inject dind init + user-defined */}}
      {{- if or $ss.template.spec.initContainers $isDind }}
      initContainers:
        {{- if $isDind }}
        - name: init-dind-externals
          image: {{ include "arc-runner-scale-set.dindInitImage" $ctx }}
          command: ["cp"]
          args: ["-r", "/home/runner/externals/.", "/home/runner/tmpDir/"]
          volumeMounts:
            - name: dind-externals
              mountPath: /home/runner/tmpDir
        {{- if ge (int $ctx.capabilities.KubeVersion.Minor) 29 }}
        - name: dind
          image: docker:dind
          args: ["dockerd", "--host=unix:///var/run/docker.sock", "--group=$(DOCKER_GROUP_GID)"]
          env:
            - name: DOCKER_GROUP_GID
              value: "123"
          securityContext:
            privileged: true
          restartPolicy: Always
          startupProbe:
            exec:
              command: ["docker", "info"]
            initialDelaySeconds: 0
            failureThreshold: 24
            periodSeconds: 5
          volumeMounts:
            - name: work
              mountPath: /home/runner/_work
            - name: dind-sock
              mountPath: /var/run
            - name: dind-externals
              mountPath: /home/runner/externals
        {{- end }}
        {{- end }}
        {{- with $ss.template.spec.initContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      containers:
      {{- if $isDind }}
        {{- /* dind runner: inject DOCKER_HOST + volume mounts */}}
        {{- range $ss.template.spec.containers }}
        {{- if eq .name "runner" }}
        - name: runner
          {{- range $key, $val := . }}
          {{- if and (ne $key "name") (ne $key "env") (ne $key "volumeMounts") }}
          {{ $key }}: {{ $val | toYaml | nindent 12 }}
          {{- end }}
          {{- end }}
          env:
            {{- with .env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            - name: DOCKER_HOST
              value: unix:///var/run/docker.sock
            - name: RUNNER_WAIT_FOR_DOCKER_IN_SECONDS
              value: "120"
          volumeMounts:
            {{- with .volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            - name: work
              mountPath: /home/runner/_work
            - name: dind-sock
              mountPath: /var/run
        {{- else }}
        - {{ . | toYaml | nindent 10 | trim }}
        {{- end }}
        {{- end }}
        {{- /* dind sidecar (k8s < 1.29) */}}
        {{- if lt (int $ctx.capabilities.KubeVersion.Minor) 29 }}
        - name: dind
          image: docker:dind
          args: ["dockerd", "--host=unix:///var/run/docker.sock", "--group=$(DOCKER_GROUP_GID)"]
          env:
            - name: DOCKER_GROUP_GID
              value: "123"
          securityContext:
            privileged: true
          volumeMounts:
            - name: work
              mountPath: /home/runner/_work
            - name: dind-sock
              mountPath: /var/run
            - name: dind-externals
              mountPath: /home/runner/externals
        {{- end }}
      {{- else }}
        {{- toYaml $ss.template.spec.containers | nindent 8 }}
      {{- end }}
      {{- /* volumes */}}
      {{- if or $ss.template.spec.volumes $isDind }}
      volumes:
        {{- if $isDind }}
        - name: dind-sock
          emptyDir: {}
        - name: dind-externals
          emptyDir: {}
        {{- /* work volume: use user-defined if present, else emptyDir */}}
        {{- $hasWork := false }}
        {{- range $ss.template.spec.volumes }}
        {{- if eq .name "work" }}{{- $hasWork = true }}{{- end }}
        {{- end }}
        {{- if $hasWork }}
          {{- range $ss.template.spec.volumes }}
          {{- if eq .name "work" }}
        - {{ . | toYaml | nindent 10 | trim }}
          {{- end }}
          {{- end }}
        {{- else }}
        - name: work
          emptyDir: {}
        {{- end }}
        {{- /* non-work volumes */}}
        {{- range $ss.template.spec.volumes }}
        {{- if ne .name "work" }}
        - {{ . | toYaml | nindent 10 | trim }}
        {{- end }}
        {{- end }}
        {{- else }}
        {{- toYaml $ss.template.spec.volumes | nindent 8 }}
        {{- end }}
      {{- end }}
{{- end }}
