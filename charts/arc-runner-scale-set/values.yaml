# Defaults merged into every scale set entry (scale set values take precedence)
defaults:
  githubConfigSecret: thecluster-bot
  # controllerServiceAccount is discovered from the cluster if not set explicitly
  controllerServiceAccount: {}
  #   name: gha-runner-scale-set-controller
  #   namespace: arc-system
  template:
    spec:
      containers:
        - name: runner
          image: ghcr.io/unstoppablemango/the-cluster/actions-runner:v2.334.0@sha256:a85521c9ca1ee56af55c5ccef7ef2ebfc52ad68aacdcb590f184055be9843251
          command: [/home/runner/run.sh]

# Scale sets to deploy. Each entry is merged with defaults above.
# Required per entry: name, githubConfigUrl
